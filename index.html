<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>点字英語の基礎</title>
<style>
body{
  margin:0; padding:24px;
  font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background:#ffffff; color:#111;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh;
}
.version{
  position:fixed;
  top:10px; left:14px;
  font-size:13px;
  opacity:0.7;
}
.wrap{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:20px;
}
h1{ font-size:22px; margin:0 0 10px 0; }
button{
  height:95px; font-size:26px; font-weight:700;
  border-radius:16px;
  border:2px solid rgba(255,255,255,0.2);
  background:#152033; color:#fff;
  width:100%;
}
button:disabled{ opacity:0.5; }
.status{ font-size:14px; opacity:0.8; }
</style>
</head>
<body>

<div class="version" id="versionDisplay"></div>

<div class="wrap">
  <h1>点字英語の基礎</h1>

  <button id="btnExplain">アルファベット説明</button>
  <button id="btnReview">復習問題（順番）</button>
  <button id="btnRandom">ランダム5問問題</button>
  <button id="btnShuffleAll">シャッフル26問問題</button>

  <div class="status" id="status">状態: 待機中</div>
</div>

<script>
/* =========================================================
   パラメータ宣言部
========================================================= */
const CONFIG = {
  app: {
    version: "v1.0.5",
    created: "2026/03/01 21:00"
  },

  speech: {
    lang: "ja-JP",
    rate: 1.1,
    pitch: 1.0,
    volume: 1.0
  },

  timing: {
    betweenItemsMs: 500,
    thinkTimeMs: 2000
  },

  messages: {
    statusIdle: "状態: 待機中",
    statusExplain: "状態: アルファベット説明中",
    statusReview: "状態: 復習問題中（順番）",
    statusShuffleAll: "状態: シャッフル26問中",
    statusRandom: "状態: ランダム5問中",

    explainStart: "アルファベット説明を開始します",
    explainEnd: "説明を終わります",

    reviewStart: "復習問題を開始します",
    reviewEnd: "復習問題を終わります",

    shuffleAllStart: "シャッフル26問の問題を開始します",
    shuffleAllEnd: "シャッフル26問の問題を終了します",

    randomStart: "ランダム5問の問題を開始します",
    randomEnd: "ランダム5問の問題を終了します",

    questionSuffix: "を点字で答えましょう。",
    answerPrefix: "答えは、",
    answerSuffix: "、です。",

    confirmSuffix: "を開始する場合は、もう一度おしてください。"
  },

  randomCount: 5,

  data: [
    {ch:"a",desc:"1の点"},
    {ch:"b",desc:"1,2の点"},
    {ch:"c",desc:"1,4の点"},
    {ch:"d",desc:"1,4,5の点"},
    {ch:"e",desc:"1,5の点"},
    {ch:"f",desc:"1,2,4の点"},
    {ch:"g",desc:"1,2,4,5の点"},
    {ch:"h",desc:"1,2,5の点"},
    {ch:"i",desc:"2,4の点"},
    {ch:"j",desc:"2,4,5の点"},
    {ch:"k",desc:"1,3の点"},
    {ch:"l",desc:"1,2,3の点"},
    {ch:"m",desc:"1,3,4の点"},
    {ch:"n",desc:"1,3,4,5の点"},
    {ch:"o",desc:"1,3,5の点"},
    {ch:"p",desc:"1,2,3,4の点"},
    {ch:"q",desc:"1,2,3,4,5の点"},
    {ch:"r",desc:"1,2,3,5の点"},
    {ch:"s",desc:"2,3,4の点"},
    {ch:"t",desc:"2,3,4,5の点"},
    {ch:"u",desc:"1,3,6の点"},
    {ch:"v",desc:"1,2,3,6の点"},
    {ch:"w",desc:"2,4,5,6の点"},
    {ch:"x",desc:"1,3,4,6の点"},
    {ch:"y",desc:"1,3,4,5,6の点"},
    {ch:"z",desc:"1,3,5,6の点"}
  ]
};
/* ========================================================= */

const btnExplain    = document.getElementById("btnExplain");
const btnReview     = document.getElementById("btnReview");
const btnShuffleAll = document.getElementById("btnShuffleAll");
const btnRandom     = document.getElementById("btnRandom");
const statusEl      = document.getElementById("status");
const versionEl     = document.getElementById("versionDisplay");

versionEl.textContent = `${CONFIG.app.version}（作成：${CONFIG.app.created}）`;

let running = false;
let pendingMode = null;
let currentMode = null;

function setStatus(text){ statusEl.textContent=text; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* iOS Safari 対策（読み上げ用テキスト正規化） */
function normalizeForTTS(text){
  return text.replace(/(\d)\s*,\s*(?=\d)/g, "$1、");
}

function speak(text){
  return new Promise((resolve,reject)=>{
    const u=new SpeechSynthesisUtterance(normalizeForTTS(text));
    u.lang=CONFIG.speech.lang;
    u.rate=CONFIG.speech.rate;
    u.pitch=CONFIG.speech.pitch;
    u.volume=CONFIG.speech.volume;
    u.onend=resolve;
    u.onerror=reject;
    speechSynthesis.speak(u);
  });
}

function cancelSpeech(){ speechSynthesis.cancel(); }

function stopRun(){
  cancelSpeech();
  running=false;
  currentMode=null;
  setStatus(CONFIG.messages.statusIdle);
}

function resetPending(){
  pendingMode=null;
  if(!running) setStatus(CONFIG.messages.statusIdle);
}

document.addEventListener("click",(e)=>{
  if(!pendingMode) return;
  const isButton =
    e.target===btnExplain ||
    e.target===btnReview ||
    e.target===btnShuffleAll ||
    e.target===btnRandom;
  if(!isButton){
    cancelSpeech();
    resetPending();
  }
},true);

async function handleTwoTap(mode,label){
  // 実行中で同じボタン → 停止
  if(running && currentMode===mode){
    stopRun();
    return;
  }
  // 実行中で別ボタン → 何もしない
  if(running) return;

  // 2回目押下（開始）
  if(pendingMode===mode){
    pendingMode=null;
    cancelSpeech();
    startMode(mode);
    return;
  }

  // 1回目押下（確認）
  pendingMode=mode;
  cancelSpeech();
  setStatus(`状態: ${label}（確認待ち）`);
  await speak(`${label}${CONFIG.messages.confirmSuffix}`);
}

function startMode(mode){
  currentMode=mode;
  if(mode==="explain")     runExplain();
  if(mode==="review")      runReview();       // 順番
  if(mode==="shuffleAll")  runShuffleAll();   // シャッフル26
  if(mode==="random")      runRandom();       // ランダム5
}

/* ====== 出題順を作る関数（重複なし） ======
   Fisher-Yatesで配列全体をシャッフルして先頭からn個取る
   → 同じ要素が2回出ることはない（重複なし）
*/
function pickUniqueRandom(n){
  const arr=[...CONFIG.data];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr.slice(0,n);
}

/* ====== モード処理 ====== */
async function runExplain(){
  running=true;
  setStatus(CONFIG.messages.statusExplain);
  await speak(CONFIG.messages.explainStart);

  for(const item of CONFIG.data){
    if(!running) return;
    await speak(`${item.ch} は、 ${item.desc}、です。`);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speak(CONFIG.messages.explainEnd);
  stopRun();
}

async function runReview(){
  running=true;
  setStatus(CONFIG.messages.statusReview);
  await speak(CONFIG.messages.reviewStart);

  // ★順番の復習（a→z）
  for(const item of CONFIG.data){
    if(!running) return;
    await speak(`${item.ch} ${CONFIG.messages.questionSuffix}`);
    await sleep(CONFIG.timing.thinkTimeMs);
    await speak(`${CONFIG.messages.answerPrefix} ${item.desc}${CONFIG.messages.answerSuffix}`);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speak(CONFIG.messages.reviewEnd);
  stopRun();
}

async function runShuffleAll(){
  running=true;
  setStatus(CONFIG.messages.statusShuffleAll);
  await speak(CONFIG.messages.shuffleAllStart);

  // ★シャッフル26問（重複なし）
  const picked = pickUniqueRandom(CONFIG.data.length);

  for(const item of picked){
    if(!running) return;
    await speak(`${item.ch} ${CONFIG.messages.questionSuffix}`);
    await sleep(CONFIG.timing.thinkTimeMs);
    await speak(`${CONFIG.messages.answerPrefix} ${item.desc}${CONFIG.messages.answerSuffix}`);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speak(CONFIG.messages.shuffleAllEnd);
  stopRun();
}

async function runRandom(){
  running=true;
  setStatus(CONFIG.messages.statusRandom);
  await speak(CONFIG.messages.randomStart);

  // ★ランダム5問（重複なし）
  const picked=pickUniqueRandom(CONFIG.randomCount);

  for(const item of picked){
    if(!running) return;
    await speak(`${item.ch} ${CONFIG.messages.questionSuffix}`);
    await sleep(CONFIG.timing.thinkTimeMs);
    await speak(`${CONFIG.messages.answerPrefix} ${item.desc}${CONFIG.messages.answerSuffix}`);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speak(CONFIG.messages.randomEnd);
  stopRun();
}

/* ====== ボタン紐付け ====== */
btnExplain.addEventListener("click",()=>handleTwoTap("explain","アルファベット説明"));
btnReview.addEventListener("click",()=>handleTwoTap("review","復習問題（順番）"));
btnShuffleAll.addEventListener("click",()=>handleTwoTap("shuffleAll","シャッフル26問問題"));
btnRandom.addEventListener("click",()=>handleTwoTap("random","ランダム5問問題"));

setStatus(CONFIG.messages.statusIdle);
</script>
</body>
</html>
