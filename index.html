<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>点字英語の基礎</title>
<style>
body{
  margin:0; padding:24px;
  font-family: system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background:#ffffff; color:#111;

  /* 画面が小さい端末でも下が見切れないように */
  display:flex;
  justify-content:flex-start;
  align-items:stretch;
  min-height:100svh;
  overflow:auto;
}
.version{
  position:fixed;
  top:10px; left:14px;
  font-size:13px;
  opacity:0.7;
}
.wrap{
  width:100%;
  max-width:520px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:20px;
}
h1{ font-size:22px; margin:0 0 10px 0; }
button{
  height:95px; font-size:26px; font-weight:700;
  border-radius:16px;
  border:2px solid rgba(255,255,255,0.2);
  background:#152033; color:#fff;
  width:100%;
}
button:disabled{ opacity:0.5; }
.status{ font-size:14px; opacity:0.8; }
</style>
</head>
<body>

<div class="version" id="versionDisplay"></div>

<div class="wrap">
  <h1>点字英語の基礎</h1>

  <button id="btnExplain">アルファベット説明</button>
  <button id="btnReview">復習問題（順番）</button>
  <button id="btnRandom">ランダム5問問題</button>
  <button id="btnShuffleAll">シャッフル26問問題</button>

  <div class="status" id="status">状態: 待機中</div>
</div>

<script>
/* =========================================================
   パラメータ宣言部
========================================================= */
const CONFIG = {
  app: {
    version: "v1.0.6",
    created: "2026/03/01 22:00"
  },

  speech: {
    // 日本語部分（説明/問題文/答え）
    lang: "ja-JP",
    rate: 1.1,
    pitch: 1.0,
    volume: 1.0,

    // 英字（A〜Z）部分
    // まず en-US を狙い、無ければ en-GB / en を拾う
    letterLangPriority: ["en-US", "en-GB", "en"]
  },

  timing: {
    betweenItemsMs: 500,
    thinkTimeMs: 2000,
    letterPauseMs: 250   // 英字の後の短い間（聞き分けに効く）
  },

  messages: {
    statusIdle: "状態: 待機中",
    statusExplain: "状態: アルファベット説明中",
    statusReview: "状態: 復習問題中（順番）",
    statusShuffleAll: "状態: シャッフル26問中",
    statusRandom: "状態: ランダム5問中",

    explainStart: "アルファベット説明を開始します",
    explainEnd: "説明を終わります",

    reviewStart: "復習問題を開始します",
    reviewEnd: "復習問題を終わります",

    shuffleAllStart: "シャッフル26問の問題を開始します",
    shuffleAllEnd: "シャッフル26問の問題を終了します",

    randomStart: "ランダム5問の問題を開始します",
    randomEnd: "ランダム5問の問題を終了します",

    questionSuffix: "を点字で答えましょう。",
    answerPrefix: "答えは、",
    answerSuffix: "、です。",

    confirmSuffix: "を開始する場合は、もう一度おしてください。"
  },

  randomCount: 5,

  data: [
    {ch:"a",desc:"1の点"},
    {ch:"b",desc:"1,2の点"},
    {ch:"c",desc:"1,4の点"},
    {ch:"d",desc:"1,4,5の点"},
    {ch:"e",desc:"1,5の点"},
    {ch:"f",desc:"1,2,4の点"},
    {ch:"g",desc:"1,2,4,5の点"},
    {ch:"h",desc:"1,2,5の点"},
    {ch:"i",desc:"2,4の点"},
    {ch:"j",desc:"2,4,5の点"},
    {ch:"k",desc:"1,3の点"},
    {ch:"l",desc:"1,2,3の点"},
    {ch:"m",desc:"1,3,4の点"},
    {ch:"n",desc:"1,3,4,5の点"},
    {ch:"o",desc:"1,3,5の点"},
    {ch:"p",desc:"1,2,3,4の点"},
    {ch:"q",desc:"1,2,3,4,5の点"},
    {ch:"r",desc:"1,2,3,5の点"},
    {ch:"s",desc:"2,3,4の点"},
    {ch:"t",desc:"2,3,4,5の点"},
    {ch:"u",desc:"1,3,6の点"},
    {ch:"v",desc:"1,2,3,6の点"},
    {ch:"w",desc:"2,4,5,6の点"},
    {ch:"x",desc:"1,3,4,6の点"},
    {ch:"y",desc:"1,3,4,5,6の点"},
    {ch:"z",desc:"1,3,5,6の点"}
  ]
};
/* ========================================================= */

const btnExplain    = document.getElementById("btnExplain");
const btnReview     = document.getElementById("btnReview");
const btnShuffleAll = document.getElementById("btnShuffleAll");
const btnRandom     = document.getElementById("btnRandom");
const statusEl      = document.getElementById("status");
const versionEl     = document.getElementById("versionDisplay");

versionEl.textContent = `${CONFIG.app.version}（作成：${CONFIG.app.created}）`;

let running = false;
let pendingMode = null;
let currentMode = null;

function setStatus(text){ statusEl.textContent=text; }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* iOS Safari 対策（数字のカンマ読み） */
function normalizeForTTS(text){
  return text.replace(/(\d)\s*,\s*(?=\d)/g, "$1、");
}

function cancelSpeech(){ speechSynthesis.cancel(); }

function stopRun(){
  cancelSpeech();
  running=false;
  currentMode=null;
  pendingMode=null;
  setStatus(CONFIG.messages.statusIdle);
}

function resetPending(){
  pendingMode=null;
  if(!running) setStatus(CONFIG.messages.statusIdle);
}

/* ============================
   音声（日本語 / 英字）
============================ */
let cachedVoices = [];
let letterVoice = null;

// iPad Safariは voices が遅れてくることがある
function refreshVoices(){
  cachedVoices = speechSynthesis.getVoices() || [];
  letterVoice = pickLetterVoice(cachedVoices);
}

// en-US優先で英字向き音声を拾う（無い場合はnull）
function pickLetterVoice(voices){
  if(!voices || voices.length===0) return null;

  // 優先言語に合うものを探す
  for(const lang of CONFIG.speech.letterLangPriority){
    const v = voices.find(x => (x.lang || "").toLowerCase() === lang.toLowerCase());
    if(v) return v;
  }

  // en で始まるもの（en-AUなど）を拾う
  const anyEn = voices.find(x => (x.lang || "").toLowerCase().startsWith("en"));
  if(anyEn) return anyEn;

  return null;
}

// 初期ロードと、voiceschangedイベントの両方で更新
refreshVoices();
if ("onvoiceschanged" in speechSynthesis) {
  speechSynthesis.addEventListener("voiceschanged", refreshVoices);
}

function speakJa(text){
  return new Promise((resolve,reject)=>{
    const u=new SpeechSynthesisUtterance(normalizeForTTS(text));
    u.lang=CONFIG.speech.lang;
    u.rate=CONFIG.speech.rate;
    u.pitch=CONFIG.speech.pitch;
    u.volume=CONFIG.speech.volume;
    u.onend=resolve;
    u.onerror=reject;
    speechSynthesis.speak(u);
  });
}

// 英字は英語音声（あればvoice指定、なければlang指定だけでフォールバック）
function speakLetter(ch){
  return new Promise((resolve,reject)=>{
    const u=new SpeechSynthesisUtterance(ch.toUpperCase());

    // voice が取れていれば指定（iPad/Winどちらも安定しやすい）
    if(letterVoice){
      u.voice = letterVoice;
      u.lang = letterVoice.lang;
    }else{
      // フォールバック：langだけ指定
      u.lang = CONFIG.speech.letterLangPriority[0] || "en-US";
    }

    // 英字はゆっくりめが聞き取りやすい
    u.rate=0.9;
    u.pitch=1.0;
    u.volume=1.0;

    u.onend=resolve;
    u.onerror=reject;
    speechSynthesis.speak(u);
  });
}

/* 1問の読み上げ（英字→間→日本語） */
async function askQuestion(item){
  await speakLetter(item.ch);
  await sleep(CONFIG.timing.letterPauseMs);
  await speakJa(CONFIG.messages.questionSuffix);
}
async function giveAnswer(item){
  await speakJa(`${CONFIG.messages.answerPrefix} ${item.desc}${CONFIG.messages.answerSuffix}`);
}

/* ============================
   2回押し確認
============================ */
document.addEventListener("click",(e)=>{
  if(!pendingMode) return;
  const isButton =
    e.target===btnExplain ||
    e.target===btnReview ||
    e.target===btnShuffleAll ||
    e.target===btnRandom;
  if(!isButton){
    cancelSpeech();
    resetPending();
  }
},true);

async function handleTwoTap(mode,label){

  // 実行中で同じボタン → 停止（残したいならこのまま）
  if(running && currentMode===mode){
    stopRun();
    return;
  }
  // 実行中で別ボタン → 何もしない
  if(running) return;

  // 2回目押下（開始）
  if(pendingMode===mode){
    pendingMode=null;
    cancelSpeech();
    startMode(mode);
    return;
  }

  // 1回目押下（確認）
  pendingMode=mode;
  cancelSpeech();
  setStatus(`状態: ${label}（確認待ち）`);
  await speakJa(`${label}${CONFIG.messages.confirmSuffix}`);
}

function startMode(mode){
  currentMode=mode;
  if(mode==="explain")     runExplain();
  if(mode==="review")      runReview();
  if(mode==="shuffleAll")  runShuffleAll();
  if(mode==="random")      runRandom();
}

/* ============================
   出題順（重複なし）
============================ */
function pickUniqueRandom(n){
  const arr=[...CONFIG.data];
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr.slice(0,n);
}

/* ============================
   モード処理
============================ */
async function runExplain(){
  running=true;
  setStatus(CONFIG.messages.statusExplain);
  await speakJa(CONFIG.messages.explainStart);

  for(const item of CONFIG.data){
    if(!running) return;
    // 説明も英字をクリアにしたいなら同じ方式
    await speakLetter(item.ch);
    await sleep(CONFIG.timing.letterPauseMs);
    await speakJa(`は、 ${item.desc}、です。`);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speakJa(CONFIG.messages.explainEnd);
  stopRun();
}

async function runReview(){
  running=true;
  setStatus(CONFIG.messages.statusReview);
  await speakJa(CONFIG.messages.reviewStart);

  for(const item of CONFIG.data){
    if(!running) return;
    await askQuestion(item);
    await sleep(CONFIG.timing.thinkTimeMs);
    await giveAnswer(item);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speakJa(CONFIG.messages.reviewEnd);
  stopRun();
}

async function runShuffleAll(){
  running=true;
  setStatus(CONFIG.messages.statusShuffleAll);
  await speakJa(CONFIG.messages.shuffleAllStart);

  const picked = pickUniqueRandom(CONFIG.data.length);

  // 念のため重複チェック（ログだけ）
  const set = new Set(picked.map(x=>x.ch));
  if(set.size !== picked.length){
    console.error("重複検出:", picked.map(x=>x.ch));
  }

  for(const item of picked){
    if(!running) return;
    await askQuestion(item);
    await sleep(CONFIG.timing.thinkTimeMs);
    await giveAnswer(item);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speakJa(CONFIG.messages.shuffleAllEnd);
  stopRun();
}

async function runRandom(){
  running=true;
  setStatus(CONFIG.messages.statusRandom);
  await speakJa(CONFIG.messages.randomStart);

  const picked=pickUniqueRandom(CONFIG.randomCount);

  for(const item of picked){
    if(!running) return;
    await askQuestion(item);
    await sleep(CONFIG.timing.thinkTimeMs);
    await giveAnswer(item);
    await sleep(CONFIG.timing.betweenItemsMs);
  }

  if(running) await speakJa(CONFIG.messages.randomEnd);
  stopRun();
}

/* ============================
   ボタン紐付け
============================ */
btnExplain.addEventListener("click",()=>handleTwoTap("explain","アルファベット説明"));
btnReview.addEventListener("click",()=>handleTwoTap("review","復習問題（順番）"));
btnRandom.addEventListener("click",()=>handleTwoTap("random","ランダム5問問題"));
btnShuffleAll.addEventListener("click",()=>handleTwoTap("shuffleAll","シャッフル26問問題"));

setStatus(CONFIG.messages.statusIdle);
</script>
</body>
</html>
